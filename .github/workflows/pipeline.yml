name: DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Install Trivy
      run: |
        sudo apt-get install wget apt-transport-https gnupg lsb-release -y
        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
        echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
        sudo apt-get update
        sudo apt-get install trivy -y

    # Scan source code & dependencies (generate report)
    - name: Scan filesystem and generate report
      run: trivy fs --format json --output trivy-report.json .

    # Upload report as audit evidence
    - name: Upload scan report
      uses: actions/upload-artifact@v3
      with:
        name: trivy-report
        path: trivy-report.json

    # Enforce compliance (fail on high/critical issues)
    - name: Scan filesystem (Code & Dependencies)
      run: trivy fs --exit-code 1 --severity HIGH,CRITICAL .

    # Build Docker image
    - name: Build Docker Image
      run: docker build -t secure-app .

    # 🔍 Scan Docker image (generate report)
    - name: Scan Docker image and generate report
      run: trivy image --format json --output trivy-image-report.json secure-app

    # ⬆️ Upload Docker scan report
    - name: Upload Docker scan report
      uses: actions/upload-artifact@v3
      with:
        name: trivy-image-report
        path: trivy-image-report.json

    # Enforce Docker image compliance
    - name: Enforce Docker Image Compliance
      run: trivy image --exit-code 1 --severity HIGH,CRITICAL secure-app